<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 3</title>
</head>
<body>

<h2>JavaScript For Loop</h2>
<p id="sample1"></p>

<h2>JavaScript While Loop</h2>
<p id="sample2"></p>

<h2>JavaScript do-While Loop</h2>
<p id="sample3"></p>

<script>
// FOR LOOP
let Sample1 = "";

for (let x = 0; x < 3; x++) {
  Sample1 += "The number is " + x + "<br>";
}
document.getElementById("sample1").innerHTML = Sample1;


// WHILE LOOP
let Sample2 = "";
let y = 0;

while (y < 5) {
  Sample2 += "The number is " + y + "<br>";
  y++;
}
document.getElementById("sample2").innerHTML = Sample2;


// DO-WHILE LOOP (5 4 3 2 1)
let Sample3 = "";
let z = 5;

do {
  Sample3 += "The number is " + z + "<br>";
  z--;
} while (z > 0);

document.getElementById("sample3").innerHTML = Sample3;
</script>

</body>
</html>
